<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixar Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:240px;
  height:100vh;
  background:#111;
  position:fixed;
  padding:20px;
}
.logo { color:#ff6a00; font-size:22px; font-weight:bold; margin-bottom:30px; }
.menu div {
  padding:12px;
  border-radius:8px;
  color:#aaa;
  cursor:pointer;
}
.menu div.active, .menu div:hover {
  background:#1a1a1a;
  color:white;
}

/* CONTENT */
.content {
  margin-left:240px;
  padding:30px;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.btn {
  background:#ff6a00;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  color:white;
}

/* CARDS */
.cards {
  display:flex;
  gap:15px;
  margin-top:20px;
}
.card {
  flex:1;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
}

/* TABLE */
.orders {
  margin-top:30px;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
}
table { width:100%; border-collapse:collapse; }
th { color:#777; text-align:left; }
td { padding:12px 0; border-bottom:1px solid #333; }

/* STATUS */
.status {
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}
.pending { background:#ffaa0020; color:#ffaa00; }
.done { background:#00ff9920; color:#00ff99; }

/* ACTION */
.action button {
  margin-right:5px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">FIXAR</div>
  <div class="menu">
    <div class="active">🏠 Tableau de bord</div>
    <div>📦 Commandes</div>
    <div>👤 Clients</div>
    <div>⚙️ Paramètres</div>
  </div>
</div>

<div class="content">

<div class="header">
  <h1>Panneau de commandes</h1>
  <button class="btn">+ Nouvelle commande</button>
</div>

<div class="cards">
  <div class="card">Total<br><b id="total">0</b></div>
  <div class="card">En attente<br><b id="pending">0</b></div>
  <div class="card">Validé<br><b id="done">0</b></div>
</div>

<canvas id="chart" height="80"></canvas>

<div class="orders">
  <h2>Commandes récentes</h2>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Adresse</th>
        <th>Service</th>
        <th>Status</th>
        <th>Prix</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="orders"></tbody>
  </table>
</div>

</div>

<script>
async function load() {
  const res = await fetch('/orders');
  const data = await res.json();

  let html = '';
  let pending = 0;
  let done = 0;

  data.forEach(o => {
    if (o.price) done++; else pending++;

    html += `
      <tr>
        <td>#${o.id}</td>
        <td>${o.name}</td>
        <td>${o.address}</td>
        <td>${o.service}</td>
        <td>
          <span class="status ${o.price ? 'done' : 'pending'}">
            ${o.price ? 'Validé' : 'En attente'}
          </span>
        </td>
        <td>${o.price ? o.price + " €" : "-"}</td>
        <td class="action">
          <button onclick="devis(${o.id})">💰</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('orders').innerHTML = html;
  document.getElementById('total').innerText = data.length;
  document.getElementById('pending').innerText = pending;
  document.getElementById('done').innerText = done;

  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'],
      datasets: [{
        data: [3,6,4,8,7,4,6]
      }]
    }
  });
}

function devis(id) {
  const price = prompt("Prix (€):");
  if (!price) return;

  fetch('/devis', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ id, price })
  }).then(() => location.reload());
}

load();
</script>

</body>
</html>
