<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixar – Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: white; min-height: 100vh; }
.login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 24px; }
.login h1 { font-size: 32px; font-weight: 900; margin-bottom: 32px; }
.login h1 span { color: #ff6a00; }
.login input { width: 100%; max-width: 320px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px; color: white; font-size: 24px; text-align: center; letter-spacing: 8px; margin-bottom: 16px; outline: none; }
.btn-login { width: 100%; max-width: 320px; background: #ff6a00; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
.main { display: none; }
.main.show { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: #111; padding: 24px 0; display: flex; flex-direction: column; border-right: 1px solid #222; flex-shrink: 0; }
.sidebar-logo { font-size: 22px; font-weight: 900; padding: 0 24px 32px; }
.sidebar-logo span { color: #ff6a00; }
.sidebar-item { padding: 12px 24px; cursor: pointer; color: #666; font-size: 14px; display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent; }
.sidebar-item.active { color: white; background: #1a1a1a; border-left-color: #ff6a00; }
.content { flex: 1; padding: 24px; overflow-y: auto; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.top-bar h1 { font-size: 24px; font-weight: 900; }
.btn-new { background: #ff6a00; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #1a1a1a; border-radius: 16px; padding: 20px; border: 1px solid #222; }
.stat-label { font-size: 12px; color: #666; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 900; }
.stat-value.orange { color: #ff6a00; }
.stat-value.yellow { color: #f59e0b; }
.stat-value.green { color: #22c55e; }
.charts { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card { background: #1a1a1a; border-radius: 16px; padding: 20px; border: 1px solid #222; }
.chart-card h3 { font-size: 14px; color: #888; margin-bottom: 16px; }
.filters { display: flex; gap: 8px; margin-bottom: 16px; }
.filter-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: #222; color: #888; }
.filter-btn.active { background: #ff6a00; color: white; }
.search-bar { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 10px 16px; color: white; width: 100%; margin-bottom: 16px; font-size: 14px; outline: none; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 16px; font-size: 12px; color: #555; border-bottom: 1px solid #222; }
td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid #1a1a1a; }
tr:hover td { background: #1a1a1a; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge.new { background: #ff6a001a; color: #ff6a00; }
.badge.inprogress { background: #f59e0b1a; color: #f59e0b; }
.badge.done { background: #22c55e1a; color: #22c55e; }
.action-btn { background: none; border: 1px solid #333; color: #888; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; margin-right: 4px; }
.action-btn:hover { border-color: #ff6a00; color: #ff6a00; }
@media (max-width: 768px) {
  .sidebar { display: none; }
  .stats { grid-template-columns: 1fr 1fr; }
  .charts { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="login" id="loginSection">
  <h1>FIX<span>AR</span></h1>
  <input type="password" id="passInput" placeholder="••••" onkeydown="if(event.key==='Enter')checkPass()">
  <button class="btn-login" onclick="checkPass()">Entrer</button>
</div>
<div class="main" id="mainSection">
  <div class="sidebar">
    <div class="sidebar-logo">FIX<span>AR</span></div>
    <div class="sidebar-item active">🏠 Tableau de bord</div>
    <div class="sidebar-item">📋 Commandes</div>
    <div class="sidebar-item">👥 Clients</div>
    <div class="sidebar-item">⚙️ Paramètres</div>
  </div>
  <div class="content">
    <div class="top-bar">
      <div>
        <h1>Panneau de commandes</h1>
        <div style="color:#666;font-size:13px;margin-top:4px;">📍 Marseille</div>
      </div>
      <button class="btn-new" onclick="window.location='/'">+ Nouvelle commande</button>
    </div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Commandes reçues</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">En attente</div>
        <div class="stat-value yellow" id="newCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">En cours</div>
        <div class="stat-value orange" id="progressCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Terminées</div>
        <div class="stat-value green" id="doneCount">0</div>
      </div>
    </div>
    <div class="charts">
      <div class="chart-card">
        <h3>Commandes par jour</h3>
        <canvas id="ordersChart" height="120"></canvas>
      </div>
      <div class="chart-card">
        <h3>Répartition des services</h3>
        <canvas id="servicesChart" height="120"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:16px;">Commandes récentes</h3>
      <div class="filters">
        <button class="filter-btn active" onclick="filterOrders('all',this)">Toutes</button>
        <button class="filter-btn" onclick="filterOrders('new',this)">Nouvelles</button>
        <button class="filter-btn" onclick="filterOrders('inprogress',this)">En cours</button>
        <button class="filter-btn" onclick="filterOrders('done',this)">Terminées</button>
      </div>
      <input class="search-bar" placeholder="🔍 Rechercher..." oninput="searchOrders(this.value)">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Client</th>
            <th>Adresse</th>
            <th>Service</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
let allOrders = [];
let currentFilter = 'all';
let currentSearch = '';
let chart1, chart2;

function checkPass() {
  if (document.getElementById("passInput").value === "fixar2024") {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("mainSection").classList.add("show");
    loadOrders();
    setInterval(loadOrders, 10000);
  } else { alert("Mot de passe incorrect!"); }
}

async function loadOrders() {
  const res = await fetch("/orders");
  allOrders = await res.json();
  updateStats();
  renderTable();
  renderCharts();
}

function updateStats() {
  document.getElementById("totalCount").textContent = allOrders.length;
  document.getElementById("newCount").textContent = allOrders.filter(o => !o.status || o.status === 'new').length;
  document.getElementById("progressCount").textContent = allOrders.filter(o => o.status === 'inprogress').length;
  document.getElementById("doneCount").textContent = allOrders.filter(o => o.status === 'done').length;
}

function filterOrders(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function searchOrders(q) {
  currentSearch = q.toLowerCase();
  renderTable();
}

function renderTable() {
  let orders = allOrders;
  if (currentFilter !== 'all') orders = orders.filter(o => (o.status || 'new') === currentFilter);
  if (currentSearch) orders = orders.filter(o => o.name.toLowerCase().includes(currentSearch) || o.service.toLowerCase().includes(currentSearch) || o.address.toLowerCase().includes(currentSearch));
  const tbody = document.getElementById("ordersTable");
  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#444;padding:40px;">Aucune commande</td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td style="color:#ff6a00;font-weight:700;">#${o.id}</td>
      <td><div style="font-weight:600;">${o.name}</div><div style="color:#555;font-size:11px;">${o.phone}</div></td>
      <td style="color:#888;">${o.address}</td>
      <td>${o.service}</td>
      <td><span class="badge ${o.status === 'done' ? 'done' : o.status === 'inprogress' ? 'inprogress' : 'new'}">${o.status === 'done' ? 'Terminé' : o.status === 'inprogress' ? 'En cours' : 'En attente'}</span></td>
      <td>
        <a href="tel:${o.phone}" class="action-btn">📞</a>
        <button class="action-btn" onclick="setStatus(${o.id},'inprogress')">🔧</button>
        <button class="action-btn" onclick="setStatus(${o.id},'done')">✅</button>
        <button class="action-btn" onclick="deleteOrder(${o.id})">🗑</button>
      </td>
    </tr>
  `).join('');
}

function renderCharts() {
  const days = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const counts = days.map((_, i) => Math.floor(Math.random() * 10) + allOrders.length);
  if (chart1) chart1.destroy();
  chart1 = new Chart(document.getElementById('ordersChart'), {
    type: 'line',
    data: { labels: days, datasets: [{ data: counts, borderColor: '#ff6a00', backgroundColor: '#ff6a0022', tension: 0.4, fill: true, pointBackgroundColor: '#ff6a00' }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#555' }, grid: { color: '#222' } }, y: { ticks: { color: '#555' }, grid: { color: '#222' } } } }
  });
  const services = {};
  allOrders.forEach(o => { services[o.service] = (services[o.service] || 0) + 1; });
  if (chart2) chart2.destroy();
  chart2 = new Chart(document.getElementById('servicesChart'), {
    type: 'doughnut',
    data: { labels: Object.keys(services), datasets: [{ data: Object.values(services), backgroundColor: ['#ff6a00','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#ec4899'] }] },
    options: { plugins: { legend: { labels: { color: '#888', font: { size: 11 } } } } }
  });
}

async function setStatus(id, status) {
  await fetch("/order/"+id+"/status", { method:"PATCH", headers:{"Content-Type":"application/json"}, body: JSON.stringify({status}) });
  loadOrders();
}

async function deleteOrder(id) {
  if (confirm("Supprimer?")) {
    await fetch("/order/"+id, { method:"DELETE" });
    loadOrders();
  }
}
</script>
</body>
</html>
