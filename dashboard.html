<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixar Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
.sidebar {
  width:220px; height:100vh; background:#111; position:fixed;
  padding:20px;
}
.sidebar h2 { color:#ff6a00; }
.menu div {
  margin:15px 0; cursor:pointer; color:#aaa;
}
.menu div:hover { color:white; }

.content {
  margin-left:220px; padding:20px;
}

.card {
  background:#1a1a1a; padding:20px; border-radius:12px;
  display:inline-block; width:22%; margin-right:2%;
}

.orders {
  margin-top:30px;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
}

.order {
  border-bottom:1px solid #333;
  padding:10px 0;
}

button {
  background:#ff6a00;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>FIXAR</h2>
  <div class="menu">
    <div>🏠 Dashboard</div>
    <div>📦 Commandes</div>
    <div>👤 Clients</div>
  </div>
</div>

<div class="content">

<h1>Panneau de commandes</h1>

<div>
  <div class="card">Commandes: <span id="total">0</span></div>
  <div class="card">En attente: <span id="pending">0</span></div>
  <div class="card">En cours: 0</div>
  <div class="card">Terminées: 0</div>
</div>

<canvas id="chart" height="100"></canvas>

<div class="orders" id="orders"></div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
background:#000a;">
  <div style="background:#222; padding:20px; margin:100px auto; width:300px;">
    <h3>Devis (€)</h3>
    <input id="price" style="width:100%; padding:10px; margin:10px 0;">
    <button onclick="save()">Valider</button>
  </div>
</div>

<script>
let currentId = null;

async function load() {
  const res = await fetch('/orders');
  const data = await res.json();

  document.getElementById('total').innerText = data.length;

  let html = '';
  data.forEach(o => {
    html += `
      <div class="order">
        <b>${o.name}</b> (${o.service})<br>
        📞 ${o.phone}<br>
        📍 ${o.address}<br>
        ${o.price ? "💰 " + o.price + " €" : ""}
        <br>
        <button onclick="openModal(${o.id})">💰 Devis</button>
      </div>
    `;
  });

  document.getElementById('orders').innerHTML = html;

  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'],
      datasets: [{
        data: [2,4,3,6,5,3,4]
      }]
    }
  });
}

function openModal(id) {
  currentId = id;
  document.getElementById('modal').style.display = 'block';
}

async function save() {
  const price = document.getElementById('price').value;

  await fetch('/devis', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ id: currentId, price })
  });

  location.reload();
}

load();
</script>

</body>
</html>
