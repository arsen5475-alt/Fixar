<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>

<body style="background:#111; color:white; font-family:sans-serif; padding:20px;">

<h1>Commandes</h1>

<div id="orders"></div>

<!-- ОКНО ДЛЯ ЦЕНЫ -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
background:#000a; padding:50px;">
  <div style="background:#222; padding:20px; border-radius:10px;">
    <h2>Prix</h2>
    <input id="price" placeholder="€" style="padding:10px; width:100%;">
    <br><br>
    <button onclick="save()" style="padding:10px;">OK</button>
  </div>
</div>

<script>
let currentId = null;

// Загрузка заказов
async function load() {
  const res = await fetch('/orders');
  const data = await res.json();

  const div = document.getElementById('orders');
  div.innerHTML = '';

  data.forEach(o => {
    const el = document.createElement('div');
    el.style.border = "1px solid #333";
    el.style.margin = "10px";
    el.style.padding = "10px";
    el.style.borderRadius = "10px";

    el.innerHTML = `
      <b>${o.name}</b> (${o.service})<br>
      📞 ${o.phone}<br>
      📍 ${o.address}<br>
      📝 ${o.description || ''}<br><br>

      ${o.price ? "💰 " + o.price + " €" : ""}

      <br><br>
      <button onclick="openModal(${o.id})">💰 Devis</button>
    `;

    div.appendChild(el);
  });
}

// Открыть окно
function openModal(id) {
  currentId = id;
  document.getElementById('modal').style.display = 'block';
}

// Сохранить цену
async function save() {
  const price = document.getElementById('price').value;

  await fetch('/devis', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      id: currentId,
      price: price
    })
  });

  document.getElementById('modal').style.display = 'none';
  load();
}

// авто обновление
load();
setInterval(load, 2000);
</script>

</body>
</html>
